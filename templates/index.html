<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جامعة حلوان التكنولوجية الدولية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .header-section { background-color: #1a375d; color: #e6c260; padding: 20px; border-radius: 10px 10px 0 0; text-align: center; }
        .main-card { border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; }
        .btn-custom { background-color: #1a375d; color: white; font-weight: bold; }
        .table-custom { direction: rtl; text-align: center; }
        .badge { font-size: 0.9rem; padding: 5px 10px; }
    </style>
</head>
<body class="py-5">
<div class="container col-md-8">
    <div class="card main-card">
        <div class="header-section">
            <img src="../WhatsApp Image 2026-06-29 at 3.33.59 AM.jpeg" alt="صورة 1" style="width: 100px; margin-bottom: 10px; border-radius: 5px;">
            <img src="../WhatsApp Image 2026-06-29 at 3.34.00 AM.jpeg" alt="صورة 2" style="width: 100px; margin-bottom: 10px; border-radius: 5px;">
            
            <h4>جامعة حلوان التكنولوجية الدولية</h4>
            <p>كلية التكنولوجيا بالقاهرة</p>
            <small>نظام استعلام نتائج الطلاب الإلكتروني</small>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">برجاء إدخال رقم الجلوس للاستعلام:</label>
                    <input type="text" name="seat_no" class="form-control" placeholder="أدخل رقم الجلوس هنا" required>
                </div>
                <button type="submit" class="btn btn-custom w-100">عرض النتيجة الحالية 🔍</button>
            </form>
            {% if searched %}
                {% endif %}
        </div>
    </div>
</div>
</body>
</html>
